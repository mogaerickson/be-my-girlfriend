<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 She Said YESSSS! 💍</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    font-family:Arial, sans-serif;

    background:linear-gradient(
        to bottom,
        #fff8dc,
        #fff5e1,
        #ffffff
    );

    padding:20px;
    overflow-x:hidden;
}

.container{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(10px);
    border-radius:25px;
    padding:25px;
    max-width:600px;
    width:100%;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.ring{
    font-size:4rem;
    animation:float 2s infinite ease-in-out;
    margin-bottom:10px;
}

h1{
    color:#d4af37;
    font-size:clamp(2rem,6vw,4rem);
    margin-bottom:10px;
}

h2{
    color:#b8860b;
    font-size:clamp(1.4rem,4vw,2.2rem);
    margin:15px 0;
}

p{
    color:#555;
    font-size:1rem;
    line-height:1.6;
    margin-top:10px;
}

.imageContainer{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin:25px 0;
}

.imageContainer img{
    width:min(150px, 30vw);
    height:auto;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:transform .3s ease;
}

.imageContainer img:hover{
    transform:scale(1.08);
}

.footer{
    margin-top:20px;
    color:#b8860b;
    font-weight:bold;
    font-size:1.1rem;
}

.sparkle{
    font-size:1.5rem;
    animation:blink 1.5s infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes blink{
    0%,100%{
        opacity:1;
    }
    50%{
        opacity:0.4;
    }
}

@media(max-width:480px){

    .container{
        padding:15px;
    }

    .imageContainer{
        gap:10px;
    }

    .imageContainer img{
        width:100px;
    }

    .ring{
        font-size:3rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="ring">💍</div>

    <h1>YAYYYYY! 💍✨</h1>

    <div class="imageContainer">
        <img src="project-img/y.gif" alt="Love GIF">
        <img src="project-img/gif-gifkk.gif" alt="Cute GIF">
        <img src="project-img/happy.png" alt="Happy Image">
    </div>

    <h2>ydnam say yessss 💖💍</h2>

    <p>
        Thank you for saying YESSS! ❤️<br><br>

        Today marks the beginning of a beautiful journey together. 💍✨<br>

        May our love continue to grow stronger every day,
        filled with happiness, laughter, and endless memories. ❤️
    </p>

    <div class="footer">
        ✨ Future Mr. & Mrs. 💍❤️ ✨
    </div>

    <br>

    <div class="sparkle">
        ✨ 💖 💍 💖 ✨
    </div>

</div>

</body>
</html>
